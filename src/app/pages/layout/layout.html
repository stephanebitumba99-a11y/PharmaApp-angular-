<div class="flex min-h-screen bg-gradient-to-br from-gray-50 to-gray-100">

  <!-- SIDEBAR -->
  <aside class="w-72 bg-white border-r border-gray-200 flex flex-col shadow-2xl transition-all duration-300 ease-in-out">

    <!-- LOGO -->
    <div class="p-6 border-b border-gray-100 bg-gradient-to-r from-green-50 to-white">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-gradient-to-br from-green-600 to-green-700 rounded-xl flex items-center justify-center shadow-lg">
          <span class="text-white text-xl font-bold">P</span>
        </div>
        <div>
          <h1 class="text-2xl font-bold bg-gradient-to-r from-green-700 to-green-500 bg-clip-text text-transparent">PharmacyOS</h1>
          <p class="text-xs text-gray-400 font-medium tracking-wider">SYSTÈME DE GESTION</p>
        </div>
      </div>
    </div>

    <!-- NAV -->
    <nav class="flex-1 p-4 space-y-1.5 text-sm overflow-y-auto">
      <p class="px-4 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Menu principal</p>

      <a *ngFor="let item of menu"
         [routerLink]="item.link"
         routerLinkActive="bg-gradient-to-r from-green-50 to-green-100 text-green-700 font-semibold shadow-sm border-r-4 border-green-600"
         class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-50 transition-all duration-200 group cursor-pointer">

        <!-- ICON -->
        <span class="text-xl group-hover:scale-110 transition-transform duration-200">{{ item.icon }}</span>

        <span class="flex-1">{{ item.label }}</span>

        <!-- Active indicator -->
        <span class="w-1.5 h-1.5 rounded-full bg-green-600 opacity-0 group-[.bg-green-100]:opacity-100 transition-opacity"></span>
      </a>

      <!-- Bottom section -->
      <div class="mt-auto pt-4 border-t border-gray-100">
        <div class="px-4 py-3 bg-gradient-to-r from-green-50 to-emerald-50 rounded-xl">
          <p class="text-xs text-gray-600 font-medium">Version 2.4.0</p>
          <p class="text-xs text-gray-400">Dernière mise à jour 2026</p>
        </div>
      </div>
    </nav>

  </aside>

  <!-- MAIN -->
  <div class="flex-1 flex flex-col min-w-0">

    <!-- TOPBAR -->
    <header class="h-20 bg-white/80 backdrop-blur-md border-b border-gray-200 flex items-center px-8 shadow-sm sticky top-0 z-10">

     

      <!-- ACTIONS -->
      <div class="flex items-center gap-4 ml-auto">
        <!-- Notification -->
        <button class="relative p-2 hover:bg-gray-100 rounded-full transition-colors duration-200">
          <span class="text-xl">🔔</span>
          <span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full border-2 border-white"></span>
        </button>

        <!-- USER -->
        <div class="flex items-center gap-4 pl-4 border-l border-gray-200 relative">

          <div class="text-right">
            <span class="text-sm font-semibold text-gray-700 block">{{ user.name }}</span>
            <span class="text-xs text-gray-400">Administrateur</span>
          </div>

          <div (click)="toggleDropdown()"
               class="w-10 h-10 bg-gradient-to-br from-green-500 to-green-600 rounded-full flex items-center justify-center cursor-pointer shadow-md hover:shadow-lg transition-all duration-200 text-white font-semibold text-sm">
            AD
          </div>

          <!-- DROPDOWN -->
          <div *ngIf="dropdownOpen"
               class="absolute right-0 top-14 bg-white border border-gray-200 rounded-2xl shadow-2xl w-56 overflow-hidden animate-slideDown">

            <div class="px-4 py-3 bg-gradient-to-r from-green-50 to-white border-b border-gray-100">
              <p class="text-sm font-semibold text-gray-700">{{ user.name }}</p>
              <p class="text-xs text-gray-400">admin@pharmacyos.com</p>
            </div>

            <button class="w-full text-left px-4 py-3 hover:bg-gray-50 transition-colors duration-150 flex items-center gap-3 text-sm">
              <span>👤</span>
              Mon profil
            </button>

            <button class="w-full text-left px-4 py-3 hover:bg-gray-50 transition-colors duration-150 flex items-center gap-3 text-sm">
              <span>⚙️</span>
              Paramètres
            </button>

            <button class="w-full text-left px-4 py-3 hover:bg-red-50 transition-colors duration-150 flex items-center gap-3 text-sm text-red-600 border-t border-gray-100">
              <span>🚪</span>
              Déconnexion
            </button>

          </div>

        </div>

      </div>

    </header>

    <!-- CONTENT -->
    <main class="p-8 flex-1 overflow-y-auto bg-gradient-to-br from-gray-50 to-gray-100/50">
      <div class="max-w-7xl mx-auto">
        <router-outlet></router-outlet>
      </div>
    </main>

  </div>

</div>
