<main class="min-h-screen flex items-center justify-center px-4 py-8 bg-gradient-to-br from-gray-50 to-gray-100/80 font-sans text-gray-800">

  <div class="w-full max-w-2xl bg-white rounded-3xl shadow-2xl border border-gray-100 p-8 md:p-10">

    <!-- HEADER -->
    <div class="mb-8 text-center">

      <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-green-500 to-green-600 rounded-2xl shadow-lg mb-4">
        <span class="text-3xl text-white">👨‍⚕️</span>
      </div>

      <h1 class="text-3xl font-bold bg-gradient-to-r from-gray-800 to-gray-600 bg-clip-text text-transparent">
        Ajouter un pharmacien
      </h1>

      <p class="text-sm text-gray-500 mt-2 flex items-center justify-center gap-2">
        <span class="inline-block w-1.5 h-1.5 bg-green-500 rounded-full"></span>
        Remplissez les informations du pharmacien
      </p>

    </div>

    <!-- FORM -->
    <form class="space-y-5">

      <!-- ROW 1 -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

        <!-- NOM -->
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1.5">
            Nom <span class="text-red-500">*</span>
          </label>

          <input
            type="text"
            [(ngModel)]="Name"
            name="Name"
            required
            placeholder="Ex: Mutombo"
            class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none transition-all text-sm"
          >
        </div>

        <!-- PRENOM -->
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1.5">
            Prénom <span class="text-red-500">*</span>
          </label>

          <input
            type="text"
            [(ngModel)]="First_name"
            name="First_name"
            required
            placeholder="Ex: Jean"
            class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none transition-all text-sm"
          >
        </div>

      </div>

      <!-- ROW 2 -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

        <!-- PHONE -->
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1.5">
            Téléphone
          </label>

          <input
            type="text"
            [(ngModel)]="phone_number"
            name="phone_number"
            placeholder="+243..."
            class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none transition-all text-sm"
          >
        </div>

        <!-- AGE -->
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1.5">
            Âge <span class="text-red-500">*</span>
          </label>

          <input
            type="number"
            [(ngModel)]="age"
            name="age"
            required
            min="18"
            placeholder="Ex: 30"
            class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none transition-all text-sm"
          >
        </div>

      </div>

      <!-- GENDER -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1.5">
          Genre <span class="text-red-500">*</span>
        </label>

        <select
          [(ngModel)]="gender"
          name="gender"
          required
          class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none transition-all text-sm"
        >
          <option value="">Sélectionnez le genre</option>
          <option value="M">👨 Homme</option>
          <option value="F">👩 Femme</option>
        </select>
      </div>

      <!-- MESSAGE -->
      <div *ngIf="message" class="flex items-center gap-3 p-4 bg-red-50 border border-red-200 rounded-xl">
        <span class="text-xl">⚠️</span>
        <p class="text-sm text-red-600">{{ message }}</p>
      </div>

      <!-- BUTTONS -->
      <div class="flex flex-col sm:flex-row gap-3 pt-4">

        <button
          type="button"
          (click)="submit()"
          class="flex-1 bg-gradient-to-r from-green-600 to-green-700 text-white py-3.5 rounded-xl hover:from-green-700 hover:to-green-800 transition-all shadow-md hover:shadow-lg font-medium flex items-center justify-center gap-2"
        >
          ➕ Confirmer
        </button>

        <a
          routerLink="/layout/pharmacien"
          class="px-6 py-3.5 text-center bg-white border border-gray-200 rounded-xl hover:bg-gray-50 hover:border-gray-300 transition-all text-sm font-medium text-gray-600 flex items-center justify-center gap-2"
        >
          ✕ Annuler
        </a>

      </div>

    </form>

  </div>

</main>
