<main class="min-h-screen flex items-center justify-center px-4 py-10 bg-slate-50 font-sans text-slate-800 relative overflow-hidden">

  <!-- ORBES DE FOND DYNAMIQUES -->
  <div class="absolute -top-24 -left-24 w-96 h-96 bg-emerald-300/35 rounded-full blur-3xl pointer-events-none"></div>
  <div class="absolute top-1/2 -right-24 w-96 h-96 bg-teal-200/40 rounded-full blur-3xl pointer-events-none"></div>
  <div class="absolute -bottom-24 left-1/3 w-96 h-96 bg-green-200/35 rounded-full blur-3xl pointer-events-none"></div>

  <!-- CONTAINER CARTE GLASS -->
  <div class="relative z-10 w-full max-w-2xl bg-white/70 backdrop-blur-2xl rounded-3xl border border-white/90 p-8 md:p-10 shadow-2xl shadow-emerald-950/10">

    <!-- HEADER -->
    <div class="mb-8 text-center">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-emerald-500 to-emerald-700 rounded-2xl shadow-lg shadow-emerald-600/25 mb-4 border border-emerald-400/30 text-white">
        <!-- Icon: User Plus (SVG) -->
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-8 h-8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 7.5v3m0 0v3m0-3h3m-3 0h-3m-2.25-4.125a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zM4 19.235v-.11a6.375 6.375 0 0112.75 0v.109A12.318 12.318 0 0110.374 21c-2.331 0-4.512-.645-6.374-1.766z" />
        </svg>
      </div>

      <h1 class="text-3xl font-extrabold bg-gradient-to-r from-emerald-950 via-slate-900 to-emerald-900 bg-clip-text text-transparent tracking-tight">
        Nouveau pharmacien
      </h1>

      <p class="text-xs font-semibold text-slate-500 mt-2 flex items-center justify-center gap-2">
        <span class="relative flex h-2 w-2">
          <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
          <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
        </span>
        Renseignez les détails du profil professionnel
      </p>
    </div>

    <!-- FORM -->
    <form class="space-y-6">

      <!-- ROW 1 : NOM & PRENOM -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-5">

        <!-- NOM -->
        <div>
          <label class="block text-xs font-bold uppercase tracking-wider text-slate-600 mb-2">
            Nom <span class="text-rose-500">*</span>
          </label>

          <div class="relative">
            <input
              type="text"
              [(ngModel)]="Name"
              name="Name"
              required
              placeholder="Ex: Mutombo"
              class="w-full pl-11 pr-4 py-3.5 bg-white/80 border border-slate-200/80 rounded-2xl text-slate-800 placeholder-slate-400 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500/40 focus:border-emerald-500 transition-all duration-200 shadow-inner"
            >
            <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-5 h-5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
              </svg>
            </div>
          </div>
        </div>

        <!-- PRENOM -->
        <div>
          <label class="block text-xs font-bold uppercase tracking-wider text-slate-600 mb-2">
            Prénom <span class="text-rose-500">*</span>
          </label>

          <div class="relative">
            <input
              type="text"
              [(ngModel)]="First_name"
              name="First_name"
              required
              placeholder="Ex: Jean"
              class="w-full pl-11 pr-4 py-3.5 bg-white/80 border border-slate-200/80 rounded-2xl text-slate-800 placeholder-slate-400 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500/40 focus:border-emerald-500 transition-all duration-200 shadow-inner"
            >
            <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-5 h-5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
              </svg>
            </div>
          </div>
        </div>

      </div>

      <!-- ROW 2 : TELEPHONE & AGE -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-5">

        <!-- PHONE -->
        <div>
          <label class="block text-xs font-bold uppercase tracking-wider text-slate-600 mb-2">
            Téléphone
          </label>

          <div class="relative">
            <input
              type="text"
              [(ngModel)]="phone_number"
              name="phone_number"
              placeholder="+243..."
              class="w-full pl-11 pr-4 py-3.5 bg-white/80 border border-slate-200/80 rounded-2xl text-slate-800 placeholder-slate-400 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500/40 focus:border-emerald-500 transition-all duration-200 shadow-inner"
            >
            <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-5 h-5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 002.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-2.826-1.239-5.11-3.522-6.349-6.349l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 00-1.091-.852H4.5A2.25 2.25 0 002.25 4.5v2.25z" />
              </svg>
            </div>
          </div>
        </div>

        <!-- AGE -->
        <div>
          <label class="block text-xs font-bold uppercase tracking-wider text-slate-600 mb-2">
            Âge <span class="text-rose-500">*</span>
          </label>

          <div class="relative">
            <input
              type="number"
              [(ngModel)]="age"
              name="age"
              required
              min="18"
              placeholder="Ex: 30"
              class="w-full pl-11 pr-4 py-3.5 bg-white/80 border border-slate-200/80 rounded-2xl text-slate-800 placeholder-slate-400 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500/40 focus:border-emerald-500 transition-all duration-200 shadow-inner"
            >
            <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-5 h-5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5" />
              </svg>
            </div>
          </div>
        </div>

      </div>

      <!-- GENDER -->
      <div>
        <label class="block text-xs font-bold uppercase tracking-wider text-slate-600 mb-2">
          Genre <span class="text-rose-500">*</span>
        </label>

        <div class="relative">
          <select
            [(ngModel)]="gender"
            name="gender"
            required
            class="w-full pl-11 pr-10 py-3.5 bg-white/80 border border-slate-200/80 rounded-2xl text-slate-800 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500/40 focus:border-emerald-500 transition-all duration-200 shadow-inner appearance-none cursor-pointer"
          >
            <option value="" disabled selected class="text-slate-400">Sélectionnez le genre</option>
            <option value="M" class="text-slate-800">Homme</option>
            <option value="F" class="text-slate-800">Femme</option>
          </select>
          <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M18 18.72a9.094 9.094 0 003.741-.479 3 3 0 00-4.682-2.72m.94 3.198l.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0112 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 016 18.719m12 0a5.971 5.971 0 00-.941-3.197m0 0A5.995 5.995 0 0012 12.75a5.995 5.995 0 00-5.058 2.772m0 0a5.97 5.97 0 00-.94 3.197M15 6.75a3 3 0 11-6 0 3 3 0 016 0zm6 3a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0zm-13.5 0a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0z" />
            </svg>
          </div>
          <!-- Chevron Arrow -->
          <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-slate-400">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
            </svg>
          </div>
        </div>
      </div>

      <!-- MESSAGE ERREUR -->
      <div *ngIf="message" class="flex items-center gap-3 p-4 bg-rose-50/80 border border-rose-200 rounded-2xl backdrop-blur-md">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-5 h-5 text-rose-600 shrink-0">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z" />
        </svg>
        <p class="text-xs font-semibold text-rose-700">{{ message }}</p>
      </div>

      <!-- BUTTONS -->
      <div class="flex flex-col-reverse sm:flex-row gap-3 pt-4">

        <a
          routerLink="/layout/pharmacien"
          class="flex-1 px-6 py-3.5 text-center bg-slate-100/80 hover:bg-slate-200/80 text-slate-700 rounded-2xl transition-all duration-150 font-bold text-sm flex items-center justify-center gap-2 active:scale-95"
        >
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
          Annuler
        </a>

        <button
          type="button"
          (click)="submit()"
          class="flex-1 bg-gradient-to-r from-emerald-600 to-emerald-700 hover:from-emerald-700 hover:to-emerald-800 text-white py-3.5 rounded-2xl transition-all duration-200 shadow-lg shadow-emerald-600/25 hover:shadow-emerald-600/35 active:scale-95 font-bold text-sm flex items-center justify-center gap-2 group"
        >
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.2" stroke="currentColor" class="w-4 h-4 group-hover:scale-110 transition-transform">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
          </svg>
          Enregistrer
        </button>

      </div>

    </form>

  </div>

</main>
