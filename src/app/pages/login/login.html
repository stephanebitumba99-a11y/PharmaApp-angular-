<main class="min-h-screen flex items-center justify-center px-4 py-8 bg-slate-50 font-sans text-slate-800 relative overflow-hidden">

  <!-- ORBES DE FOND DYNAMIQUES -->
  <div class="absolute -top-20 -left-20 w-96 h-96 bg-emerald-300/35 rounded-full blur-3xl pointer-events-none animate-blob"></div>
  <div class="absolute top-1/3 -right-20 w-96 h-96 bg-teal-200/45 rounded-full blur-3xl pointer-events-none animate-blob animation-delay-2000"></div>
  <div class="absolute -bottom-20 left-1/3 w-96 h-96 bg-green-200/40 rounded-full blur-3xl pointer-events-none animate-blob animation-delay-4000"></div>

  <!-- CONTAINER CARTE GLASS -->
  <div class="relative z-10 w-full max-w-md bg-white/70 backdrop-blur-2xl rounded-3xl border border-white/90 p-8 md:p-10 shadow-2xl shadow-emerald-950/10 animate-fade-in-up">

    <!-- HEADER -->
    <div class="mb-8 text-center">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-emerald-500 to-emerald-700 rounded-2xl shadow-lg shadow-emerald-600/25 mb-4 border border-emerald-400/30 text-white">
        <!-- Icon: Medication/Pill (SVG) -->
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-8 h-8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 1.5H8.25A2.25 2.25 0 006 3.75v16.5a2.25 2.25 0 002.25 2.25h7.5A2.25 2.25 0 0018 20.25V3.75a2.25 2.25 0 00-2.25-2.25H13.5m-3 0V3h3V1.5m-3 0h3m-3 18.75h3" />
        </svg>
      </div>

      <h1 class="text-3xl font-extrabold bg-gradient-to-r from-emerald-950 via-slate-900 to-emerald-900 bg-clip-text text-transparent tracking-tight">
        Zarba Pharma
      </h1>

      <p class="text-xs font-semibold text-slate-500 mt-2 flex items-center justify-center gap-2">
        <span class="relative flex h-2 w-2">
          <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
          <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
        </span>
        Connexion à votre espace sécurisé
      </p>
    </div>

    <!-- FORM -->
    <form class="space-y-5" (ngSubmit)="login()">

      <!-- EMAIL -->
      <div>
        <label class="block text-xs font-bold uppercase tracking-wider text-slate-600 mb-2">
          Adresse email
        </label>

        <div class="relative">
          <input
            type="email"
            [(ngModel)]="email"
            name="email"
            placeholder="pharmacien@pharmacyos.com"
            class="w-full pl-11 pr-4 py-3.5 bg-white/80 border border-slate-200/80 rounded-2xl text-slate-800 placeholder-slate-400 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500/40 focus:border-emerald-500 transition-all duration-200 shadow-inner"
          >
          <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400">
            <!-- Icon: At symbol (SVG) -->
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" />
            </svg>
          </div>
        </div>
      </div>

      <!-- PASSWORD -->
      <div>
        <label class="block text-xs font-bold uppercase tracking-wider text-slate-600 mb-2">
          Mot de passe
        </label>

        <div class="relative">
          <input
            type="password"
            [(ngModel)]="password"
            name="password"
            placeholder="••••••••"
            class="w-full pl-11 pr-4 py-3.5 bg-white/80 border border-slate-200/80 rounded-2xl text-slate-800 placeholder-slate-400 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500/40 focus:border-emerald-500 transition-all duration-200 shadow-inner"
          >
          <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400">
            <!-- Icon: Lock (SVG) -->
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
            </svg>
          </div>
        </div>
      </div>

      <!-- MESSAGE ERREUR -->
      <div *ngIf="message" class="flex items-center gap-3 p-4 bg-rose-50/80 border border-rose-200 rounded-2xl backdrop-blur-md animate-fade-in">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-5 h-5 text-rose-600 shrink-0">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z" />
        </svg>
        <p class="text-xs font-semibold text-rose-700">{{ message }}</p>
      </div>

      <!-- BUTTON -->
      <button
        type="submit"
        class="w-full mt-2 bg-gradient-to-r from-emerald-600 to-emerald-700 hover:from-emerald-700 hover:to-emerald-800 text-white py-3.5 rounded-2xl transition-all duration-200 shadow-lg shadow-emerald-600/25 hover:shadow-emerald-600/35 active:scale-95 font-bold text-sm flex items-center justify-center gap-2 group"
      >
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4 group-hover:translate-x-0.5 transition-transform">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75" />
        </svg>
        Se connecter
      </button>

    </form>

  </div>

</main>
