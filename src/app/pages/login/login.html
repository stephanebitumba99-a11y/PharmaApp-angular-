<main class="min-h-screen flex items-center justify-center px-4 py-8 bg-gradient-to-br from-gray-50 to-gray-100/80 font-sans text-gray-800">

  <div class="w-full max-w-md bg-white rounded-3xl shadow-2xl border border-gray-100 p-8 md:p-10 animate-slideUp">

    <!-- HEADER -->
    <div class="mb-8 text-center">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-green-500 to-green-600 rounded-2xl shadow-lg mb-4">
        <span class="text-3xl text-white">💊</span>
      </div>

      <h1 class="text-3xl font-bold bg-gradient-to-r from-gray-800 to-gray-600 bg-clip-text text-transparent">
        PharmacyOS
      </h1>

      <p class="text-sm text-gray-500 mt-2 flex items-center justify-center gap-2">
        <span class="inline-block w-1.5 h-1.5 bg-green-500 rounded-full"></span>
        Connexion à votre espace
      </p>
    </div>

    <!-- FORM -->
    <form class="space-y-5" (ngSubmit)="login()">

      <!-- EMAIL -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1.5">
          Adresse email
        </label>

        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="pharmacien@pharmacyos.com"
          class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none transition-all duration-200 text-sm"
        >
      </div>

      <!-- PASSWORD -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1.5">
          Mot de passe
        </label>

        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="••••••••"
          class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none transition-all duration-200 text-sm"
        >
      </div>

      <!-- MESSAGE ERREUR -->
      <div *ngIf="message" class="flex items-center gap-3 p-4 bg-red-50 border border-red-200 rounded-xl">
        <span class="text-xl">⚠️</span>
        <p class="text-sm text-red-600">{{ message }}</p>
      </div>

      <!-- BUTTON -->
      <button
        type="submit"
        class="w-full bg-gradient-to-r from-green-600 to-green-700 text-white py-3.5 rounded-xl hover:from-green-700 hover:to-green-800 transition-all duration-200 shadow-md hover:shadow-lg font-medium flex items-center justify-center gap-2"
      >
        🔐 Se connecter
      </button>

    </form>

  </div>

</main>
